<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic AI — Prototype</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f2;
      color: #1a1a2e;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ---- SIDEBAR ---- */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: #1a1a2e;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      transition: width 0.25s ease;
    }

    #sidebar.collapsed { width: 56px; min-width: 56px; }

    .sidebar-top {
      padding: 20px 16px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
    }

    .sidebar-logo span { color: #6c63ff; }

    .collapse-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      flex-shrink: 0;
      line-height: 1;
    }

    .collapse-btn:hover { color: #fff; }

    .chapter-group { padding: 8px 0; }

    .chapter-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      padding: 10px 16px 6px;
      white-space: nowrap;
      overflow: hidden;
    }

    .lesson-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: none;
      border: none;
      padding: 9px 16px;
      text-align: left;
      cursor: pointer;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
    }

    .lesson-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .lesson-btn.active { background: rgba(108,99,255,0.2); color: #fff; }

    .lesson-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .lesson-dot.complete { background: #4caf50; }
    .lesson-dot.active   { background: #6c63ff; }

    .lesson-parts {
      display: flex;
      gap: 4px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .part-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .part-badge.has  { background: rgba(108,99,255,0.25); color: #9b93ff; }
    .part-badge.missing { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.2); }

    /* ---- MAIN ---- */
    #main {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid #ebebeb;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .breadcrumb {
      font-size: 13px;
      color: #aaa;
    }

    .breadcrumb span { color: #1a1a2e; font-weight: 600; }

    .content-area {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 0;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 32px;
      align-items: start;
    }

    /* ---- LESSON CONTENT ---- */
    .lesson-content {
      padding-right: 40px;
    }

    .module-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6c63ff;
      margin-bottom: 10px;
    }

    .lesson-content h1 {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .lesson-content h2 {
      font-size: 18px;
      font-weight: 700;
      margin: 32px 0 12px;
      color: #1a1a2e;
    }

    .lesson-content h3 {
      font-size: 15px;
      font-weight: 600;
      margin: 24px 0 8px;
    }

    .lesson-content p {
      font-size: 15px;
      line-height: 1.75;
      color: #333;
      margin-bottom: 16px;
    }

    .lesson-content ul, .lesson-content ol {
      padding-left: 20px;
      margin-bottom: 16px;
    }

    .lesson-content li {
      font-size: 15px;
      line-height: 1.75;
      color: #333;
      margin-bottom: 6px;
    }

    .lesson-content strong { color: #1a1a2e; }

    .lesson-content blockquote {
      border-left: 3px solid #6c63ff;
      padding: 12px 16px;
      margin: 20px 0;
      background: #f8f7ff;
      border-radius: 0 8px 8px 0;
      font-style: italic;
      color: #555;
    }

    .lesson-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 14px;
    }

    .lesson-content th {
      background: #f5f4f2;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #e8e8e8;
    }

    .lesson-content td {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      color: #444;
    }

    .lesson-content code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'SF Mono', monospace;
    }

    /* Karel callout */
    .lesson-content h2:has(+ p) {
      scroll-margin-top: 80px;
    }

    /* Style the Karel section distinctly */
    .karel-section {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2b55 100%);
      border-radius: 14px;
      padding: 20px 24px;
      margin: 28px 0;
      color: #fff;
    }

    .karel-section .karel-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6c63ff;
      margin-bottom: 10px;
    }

    .karel-section p { color: rgba(255,255,255,0.8); font-size: 14px; }

    /* ---- SIDEBAR RIGHT ---- */
    .right-sidebar { position: sticky; top: 80px; }

    .sidebar-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #ebebeb;
    }

    .sidebar-card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 12px;
    }

    .sidebar-card p { font-size: 13px; line-height: 1.6; color: #555; }

    /* ---- QUIZ ---- */
    .quiz-section {
      margin-top: 40px;
      padding-top: 32px;
      border-top: 2px solid #f0f0f0;
    }

    .quiz-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .quiz-icon {
      width: 36px; height: 36px;
      background: #6c63ff;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px;
    }

    .quiz-title { font-size: 18px; font-weight: 700; }
    .quiz-subtitle { font-size: 13px; color: #888; margin-top: 2px; }

    .question-card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 16px;
      border: 1px solid #ebebeb;
    }

    .question-text {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .options { display: flex; flex-direction: column; gap: 10px; }

    .option-btn {
      background: #f8f8f8;
      border: 2px solid #ebebeb;
      border-radius: 10px;
      padding: 12px 16px;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      color: #333;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
      line-height: 1.5;
    }

    .option-btn:hover:not(:disabled) { border-color: #6c63ff; background: #f8f7ff; }
    .option-btn.correct { border-color: #4caf50; background: #f0faf0; color: #2e7d32; }
    .option-btn.wrong   { border-color: #f44336; background: #fff5f5; color: #c62828; }
    .option-btn:disabled { cursor: default; }

    .explanation {
      margin-top: 14px;
      padding: 12px 16px;
      background: #f8f7ff;
      border-left: 3px solid #6c63ff;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: #444;
      line-height: 1.6;
      display: none;
    }

    .explanation.show { display: block; }

    /* ---- NAV FOOTER ---- */
    .lesson-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid #f0f0f0;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      border: 2px solid #ebebeb;
      background: #fff;
      color: #1a1a2e;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .nav-btn:hover { border-color: #6c63ff; }
    .nav-btn.primary { background: #6c63ff; color: #fff; border-color: #6c63ff; }
    .nav-btn.primary:hover { background: #5850d9; border-color: #5850d9; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* ---- EMPTY STATE ---- */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: #aaa;
      text-align: center;
      gap: 12px;
    }

    .empty-state h2 { color: #1a1a2e; font-size: 22px; }
    .empty-state p  { font-size: 15px; max-width: 380px; line-height: 1.6; }

    .loading { color: #aaa; padding: 40px; text-align: center; font-size: 14px; }
  </style>
</head>
<body>

<!-- ====== LEFT SIDEBAR ====== -->
<nav id="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-logo">Agentic <span>AI</span></div>
    <button class="collapse-btn" onclick="toggleSidebar()" title="Toggle sidebar">◀</button>
  </div>
  <div id="chapter-nav" class="loading">Loading chapters...</div>
</nav>

<!-- ====== MAIN ====== -->
<div id="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb">Select a lesson to begin</div>
  </div>
  <div class="content-area" id="content-area">
    <div class="lesson-content">
      <div class="empty-state">
        <h2>Welcome to Agentic AI</h2>
        <p>Select a chapter and lesson from the sidebar to start learning. Each lesson includes an explanation, a Karel example, and a knowledge quiz.</p>
      </div>
    </div>
    <div class="right-sidebar"></div>
  </div>
</div>

<script>
  // =============================================
  // STATE
  // =============================================
  let chapters = [];
  let currentChapter = null;
  let currentLesson  = null;
  let currentLessonIndex = 0;
  let allLessons = []; // flat list for prev/next

  // =============================================
  // BOOT
  // =============================================
  async function boot() {
    try {
      const res = await fetch('/api/chapters');
      chapters  = await res.json();

      // Build flat lesson list for navigation
      chapters.forEach(ch => {
        ch.lessons.forEach(l => {
          allLessons.push({ chapter: ch, lesson: l });
        });
      });

      renderSidebar();
    } catch (e) {
      document.getElementById('chapter-nav').innerHTML =
        '<div style="color:#ff6584;padding:16px;font-size:13px;">Could not load chapters.<br>Make sure serve.js is running.</div>';
    }
  }

  // =============================================
  // SIDEBAR
  // =============================================
  function renderSidebar() {
    const nav = document.getElementById('chapter-nav');
    nav.innerHTML = chapters.map(ch => `
      <div class="chapter-group">
        <div class="chapter-label">Module ${ch.chapter} — ${ch.title}</div>
        ${ch.lessons.map(l => `
          <button
            class="lesson-btn"
            id="btn-${ch.folder}-${l.id}"
            onclick="loadLesson('${ch.folder}', '${l.id}')"
          >
            <div class="lesson-dot"></div>
            <span style="overflow:hidden;text-overflow:ellipsis">${l.title}</span>
            <div class="lesson-parts">
              ${l.parts.quiz      ? '<span class="part-badge has">Q</span>'  : '<span class="part-badge missing">Q</span>'}
              ${l.parts.simulation? '<span class="part-badge has">S</span>'  : ''}
            </div>
          </button>
        `).join('')}
      </div>
    `).join('');
  }

  function setActiveBtn(folder, lessonId) {
    document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(`btn-${folder}-${lessonId}`);
    if (btn) btn.classList.add('active');
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const btn = document.querySelector('.collapse-btn');
    sidebar.classList.toggle('collapsed');
    btn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
  }

  // =============================================
  // LOAD LESSON
  // =============================================
  async function loadLesson(folder, lessonId) {
    const chapter = chapters.find(c => c.folder === folder);
    const lesson  = chapter?.lessons.find(l => l.id === lessonId);
    if (!lesson) return;

    currentChapter = chapter;
    currentLesson  = lesson;
    currentLessonIndex = allLessons.findIndex(
      e => e.chapter.folder === folder && e.lesson.id === lessonId
    );

    setActiveBtn(folder, lessonId);

    // Breadcrumb
    document.getElementById('breadcrumb').innerHTML =
      `Module ${chapter.chapter} <span>/ ${lesson.title}</span>`;

    // Fetch markdown
    const mdRes  = await fetch(`/api/lessons/${folder}/${lesson.file}`);
    const mdText = await mdRes.text();

    // Parse Karel section out to style it
    const processedMd = mdText.replace(
      /## Karel in practice([\s\S]*?)(?=\n## |\n---|\n*$)/g,
      (match, body) => `<div class="karel-callout-marker">${body.trim()}</div>`
    );

    const htmlContent = marked.parse(processedMd);

    // Style Karel sections after parse
    const styledContent = htmlContent.replace(
      /<div class="karel-callout-marker">([\s\S]*?)<\/div>/g,
      `<div class="karel-section">
        <div class="karel-label">⬡ Karel in practice</div>
        $1
      </div>`
    );

    // Load quiz if exists
    let quizHtml = '';
    if (lesson.parts.quiz && lesson.parts.quiz_file) {
      const qRes = await fetch(`/api/lessons/${folder}/${lesson.parts.quiz_file}`);
      if (qRes.ok) {
        const quiz = await qRes.json();
        quizHtml   = renderQuiz(quiz);
      }
    }

    // Right sidebar content
    const sidebarHtml = `
      <div class="sidebar-card">
        <div class="sidebar-card-label">This lesson</div>
        <p>${lesson.title}</p>
        <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;">
          <span class="part-badge has" style="font-size:11px;padding:4px 8px;">Content</span>
          <span class="part-badge has" style="font-size:11px;padding:4px 8px;">Karel example</span>
          ${lesson.parts.quiz ? '<span class="part-badge has" style="font-size:11px;padding:4px 8px;">Quiz</span>' : ''}
          ${lesson.parts.simulation ? '<span class="part-badge has" style="font-size:11px;padding:4px 8px;">Simulation</span>' : ''}
        </div>
      </div>
      <div class="sidebar-card">
        <div class="sidebar-card-label">Karel</div>
        <p>Karel is a fraud reporting agent deployed by a bank. He appears in every lesson as the practical anchor for each concept.</p>
      </div>
    `;

    // Nav
    const prev = currentLessonIndex > 0 ? allLessons[currentLessonIndex - 1] : null;
    const next = currentLessonIndex < allLessons.length - 1 ? allLessons[currentLessonIndex + 1] : null;

    const navHtml = `
      <div class="lesson-nav">
        <button class="nav-btn" onclick="loadLesson('${prev?.chapter.folder}','${prev?.lesson.id}')" ${!prev ? 'disabled' : ''}>
          ← Previous
        </button>
        <button class="nav-btn primary" onclick="loadLesson('${next?.chapter.folder}','${next?.lesson.id}')" ${!next ? 'disabled' : ''}>
          Next →
        </button>
      </div>
    `;

    // Render
    document.getElementById('content-area').innerHTML = `
      <div class="lesson-content">
        <div class="module-tag">Module ${chapter.chapter} — ${chapter.title}</div>
        ${styledContent}
        ${quizHtml}
        ${navHtml}
      </div>
      <div class="right-sidebar">
        ${sidebarHtml}
      </div>
    `;

    document.getElementById('main').scrollTop = 0;
  }

  // =============================================
  // QUIZ RENDERER
  // =============================================
  function renderQuiz(quiz) {
    const questions = quiz.questions.map((q, qi) => `
      <div class="question-card" id="qcard-${qi}">
        <div class="question-text">${qi + 1}. ${q.question}</div>
        <div class="options">
          ${q.options.map((opt, oi) => `
            <button
              class="option-btn"
              id="opt-${qi}-${oi}"
              onclick="answerQuestion(${qi}, ${oi}, ${q.correct}, \`${q.explanation.replace(/`/g, "'")}\`)"
            >${opt}</button>
          `).join('')}
        </div>
        <div class="explanation" id="exp-${qi}">${q.explanation}</div>
      </div>
    `).join('');

    return `
      <div class="quiz-section">
        <div class="quiz-header">
          <div class="quiz-icon">✦</div>
          <div>
            <div class="quiz-title">Knowledge Check</div>
            <div class="quiz-subtitle">${quiz.questions.length} questions — test what you just learned</div>
          </div>
        </div>
        ${questions}
      </div>
    `;
  }

  function answerQuestion(qi, chosen, correct, explanation) {
    const card = document.getElementById(`qcard-${qi}`);
    const buttons = card.querySelectorAll('.option-btn');
    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === correct) btn.classList.add('correct');
      else if (i === chosen) btn.classList.add('wrong');
    });
    const exp = document.getElementById(`exp-${qi}`);
    exp.classList.add('show');
  }

  // =============================================
  // INIT
  // =============================================
  boot();
</script>
</body>
</html>
